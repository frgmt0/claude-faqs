question: What is Claude Fable 5 and how is it different from Opus?
answer: |
  Claude Fable 5 (`claude-fable-5`), released June 9, 2026, is Anthropic's first generally available "Mythos-class" model — a capability tier above Opus. Anthropic describes it as a Mythos-class model made safe for general use. It has a 1M token context window, up to 128K output tokens, and adaptive thinking that is always on (there is no extended-thinking toggle to manage).

  Compared to Opus 4.8: more capable on hard reasoning and agentic work, twice the price ($10/$50 per million input/output tokens vs $5/$25), and it ships with stricter safety classifiers — a small share of sessions (Anthropic says under 5%) get routed to Opus 4.8 when a topic trips them.

  It is available on the Claude API, AWS Bedrock, Google Vertex AI, and Microsoft Foundry. Note it uses the newer tokenizer (same as Opus 4.7+), which produces up to ~30-35% more tokens for the same text.
